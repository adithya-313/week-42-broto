name: ML PIPELINE

on:
  push:

jobs:
  train:  
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version:"3.11"

      - name: install dependencies
        run: |
          pip install -r requirements.txt
      - name: run python
        run: |
          python train.py

      - name: bbuild image
        run: |
          docker build -t ml-api
      
    