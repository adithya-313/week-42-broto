name: ML Pipeline

on:
  push:
    branches:
      - main

jobs:

  train:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Train Model
        run: |
          python train.py

      - name: Verify Model
        run: |
          test -f models/model.pkl

      - name: Build Docker Image
        run: |
          docker build -t ml-api .